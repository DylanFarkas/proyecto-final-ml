version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: esteban93040/backend:latest
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
    image: esteban93040/frontend:latest
    ports:
      - "5173:80"  
    restart: always
    depends_on:
      - backend
